spring.config.import=optional:file:.env[.properties]

spring.application.name=vault

spring.datasource.url=jdbc:postgresql://localhost:5432/vault_db
spring.datasource.username=myuser
spring.datasource.password=secret

sping.threads.virtual.enabled=true

jwt.secret=${JWT_SECRET}
jwt.expiration=36000000

vault.encryption.key=${ENCRYPTION_KEY}

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=vaultpassword
server.ssl.key-alias=vaultkey