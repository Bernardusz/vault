spring.config.import=optional:file:.env[.properties]

spring.application.name=vault

spring.datasource.url=jdbc:postgresql://localhost:5432/vault_db
spring.datasource.username=myuser
spring.datasource.password=secret
spring.sql.init.mode=always

spring.threads.virtual.enabled=true

jwt.secret=${JWT_SECRET}
jwt.expiration=36000000

vault.encryption.key=${ENCRYPTION_KEY}

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=vaultpassword
server.ssl.key-alias=vaultkey

# ⚡ Force Spring Security to print every internal evaluation step to the terminal log
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=TRACE

# Include exception messages in server response logs (useful for checking terminal output)
server.error.include-message=always
